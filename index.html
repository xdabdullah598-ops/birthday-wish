<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --night-deep:#241332;
    --night-mid:#4A2A5C;
    --night-warm:#7A3E70;
    --pink:#FF9FC8;
    --pink-soft:#FFC9E0;
    --lavender:#C9A6E8;
    --gold:#F7D488;
    --gold-deep:#E0A952;
    --cream:#FFF6F0;
    --rose:#E8879E;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  html,body{ height:100%; overflow-x:hidden; }

  body{
    min-height:100vh;
    background:
      radial-gradient(ellipse at 20% 0%, rgba(255,159,200,0.18), transparent 55%),
      radial-gradient(ellipse at 80% 10%, rgba(201,166,232,0.2), transparent 55%),
      linear-gradient(180deg, var(--night-deep) 0%, var(--night-mid) 45%, var(--night-warm) 100%);
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:50px 20px;
    text-align:center;
    font-family:'Poppins', sans-serif;
    color:var(--cream);
  }

  /* Twinkling stars */
  #stars{
    position:fixed; inset:0; pointer-events:none; z-index:0;
  }
  .star{
    position:absolute;
    width:3px; height:3px;
    background:#fff;
    border-radius:50%;
    animation:twinkle ease-in-out infinite;
    opacity:0.6;
  }
  @keyframes twinkle{
    0%,100%{ opacity:0.15; transform:scale(1); }
    50%{ opacity:1; transform:scale(1.6); }
  }

  #stage{
    position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:1;
  }

  #fireworksCanvas{
    position:fixed; inset:0; pointer-events:none; z-index:1; width:100%; height:100%;
  }

  /* Balloons */
  .balloon{
    position:absolute; bottom:-220px; width:64px; height:82px;
    border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
    opacity:0.95;
    animation:rise linear infinite;
    filter:drop-shadow(0 8px 12px rgba(0,0,0,0.25));
  }
  .balloon::after{
    content:""; position:absolute; bottom:-38px; left:50%;
    width:1.5px; height:38px; background:rgba(255,255,255,0.4);
    transform:translateX(-50%);
  }
  .balloon::before{
    content:""; position:absolute; top:13px; left:16px;
    width:14px; height:20px; background:rgba(255,255,255,0.4);
    border-radius:50%; transform:rotate(-20deg);
  }
  @keyframes rise{
    0%{ transform:translateY(0) translateX(0) rotate(0deg); }
    25%{ transform:translateY(-30vh) translateX(22px) rotate(4deg); }
    50%{ transform:translateY(-60vh) translateX(-22px) rotate(-4deg); }
    75%{ transform:translateY(-90vh) translateX(16px) rotate(3deg); }
    100%{ transform:translateY(-130vh) translateX(0) rotate(0deg); }
  }

  /* Gift boxes floating */
  .gift{
    position:absolute; bottom:-120px; width:36px; height:36px;
    animation:riseGift linear infinite;
    opacity:0.9;
  }
  @keyframes riseGift{
    0%{ transform:translateY(0) rotate(-6deg); }
    50%{ transform:translateY(-65vh) rotate(6deg); }
    100%{ transform:translateY(-130vh) rotate(-6deg); }
  }

  /* Confetti */
  .confetti-piece{
    position:absolute; top:-20px; opacity:0.95;
    animation:fall linear infinite;
  }
  @keyframes fall{
    0%{ transform:translateY(0) rotate(0deg); }
    100%{ transform:translateY(110vh) rotate(360deg); }
  }

  main{ position:relative; z-index:2; max-width:640px; width:100%; }

  .eyebrow{
    display:inline-block; font-size:13px; letter-spacing:4px; text-transform:uppercase;
    color:var(--gold);
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(247,212,136,0.35);
    padding:7px 18px; border-radius:999px; margin-bottom:26px;
    backdrop-filter:blur(6px);
  }

  h1{
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-weight:600;
    font-size:clamp(1.6rem, 4.2vw, 2.4rem);
    color:var(--cream);
    text-shadow:0 4px 24px rgba(0,0,0,0.3);
    letter-spacing:1px;
  }

  .name-script{
    display:block;
    font-family:'Great Vibes', cursive;
    font-size:clamp(3.4rem, 12vw, 6.5rem);
    line-height:1.15;
    background:linear-gradient(90deg, var(--gold), var(--pink) 55%, var(--lavender));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    margin-top:4px;
    filter:drop-shadow(0 2px 18px rgba(255,159,200,0.35));
  }

  .message{
    margin:28px auto 30px;
    max-width:480px;
    font-size:1.08rem;
    font-weight:300;
    line-height:1.8;
    color:var(--cream);
    opacity:0.9;
  }

  /* Realistic cake */
  #cakeWrap{
    margin:6px auto 26px;
    cursor:pointer;
    user-select:none;
    display:inline-block;
    filter:drop-shadow(0 18px 30px rgba(0,0,0,0.35));
  }
  #cakeSvg{ width:220px; height:auto; transition:transform 0.3s ease; }
  #cakeWrap:hover #cakeSvg{ transform:translateY(-4px) scale(1.02); }

  .flame{ transform-origin:50% 100%; animation:flicker 1s infinite ease-in-out alternate; }
  @keyframes flicker{
    0%{ transform:scale(1) rotate(-3deg); opacity:1;}
    100%{ transform:scale(1.18) rotate(3deg); opacity:0.85;}
  }
  .glow{ animation:glowPulse 1s infinite ease-in-out alternate; }
  @keyframes glowPulse{
    0%{ opacity:0.35; }
    100%{ opacity:0.7; }
  }

  .cake-hint{
    margin-top:8px; font-size:12.5px; letter-spacing:0.6px;
    color:var(--cream); opacity:0.65;
  }

  .controls{
    display:flex; gap:14px; justify-content:center; flex-wrap:wrap; margin-top:8px;
  }

  button.action{
    font-family:'Poppins', sans-serif; font-size:14.5px; font-weight:500;
    padding:13px 26px; border-radius:999px; border:none; cursor:pointer;
    background:linear-gradient(135deg, var(--pink), var(--rose));
    color:#3a1030;
    box-shadow:0 10px 24px rgba(255,159,200,0.35);
    transition:transform 0.15s ease, box-shadow 0.15s ease;
  }
  button.action:hover{ transform:translateY(-2px); box-shadow:0 14px 30px rgba(255,159,200,0.5); }
  button.action:active{ transform:translateY(0); }

  button.ghost{
    background:transparent; border:1.5px solid rgba(247,212,136,0.5);
    color:var(--gold); box-shadow:none;
  }
  button.ghost:hover{ background:rgba(247,212,136,0.1); }

  footer{
    position:relative; z-index:2; margin-top:44px; font-size:11.5px;
    color:rgba(255,246,240,0.45); letter-spacing:0.6px;
  }

  @media (prefers-reduced-motion: reduce){
    .balloon, .gift, .confetti-piece, .flame, .glow, .star{ animation:none !important; }
  }
</style>
</head>
<body>

<div id="stars"></div>
<canvas id="fireworksCanvas"></canvas>
<div id="stage"></div>

<main>
  <span class="eyebrow">✨ made just for you ✨</span>
  <h1>Happy Birthday<span class="name-script" id="nameLine">Beautiful</span></h1>
  <p class="message" id="messageText">Another year more radiant, more unstoppable, more you. May today be as sparkling and wonderful as you are — enjoy every single moment of it!</p>

  <div id="cakeWrap" title="Blow out the candles!">
    <svg id="cakeSvg" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="flameGrad" cx="50%" cy="30%" r="70%">
          <stop offset="0%" stop-color="#FFF3C4"/>
          <stop offset="55%" stop-color="#F7D488"/>
          <stop offset="100%" stop-color="#E0A952"/>
        </radialGradient>
        <linearGradient id="tier1" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#FFD6E8"/>
          <stop offset="100%" stop-color="#FFB6D5"/>
        </linearGradient>
        <linearGradient id="tier2" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#F3C9F0"/>
          <stop offset="100%" stop-color="#DDA8E8"/>
        </linearGradient>
        <linearGradient id="tier3" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#FFF0DC"/>
          <stop offset="100%" stop-color="#F7D9A8"/>
        </linearGradient>
        <radialGradient id="plateShadow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="rgba(0,0,0,0.28)"/>
          <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
        </radialGradient>
      </defs>

      <!-- soft ground shadow -->
      <ellipse cx="110" cy="205" rx="70" ry="10" fill="url(#plateShadow)"/>

      <!-- candle glow -->
      <circle class="glow" cx="110" cy="26" r="16" fill="#FFE9A8" opacity="0.4"/>

      <!-- flame -->
      <g class="flame">
        <path d="M110 6 C104 14 104 22 110 26 C116 22 116 14 110 6 Z" fill="url(#flameGrad)"/>
      </g>
      <!-- wick / candle -->
      <rect x="107.5" y="26" width="5" height="18" rx="2" fill="#FFF6F0"/>
      <rect x="107.5" y="26" width="5" height="18" rx="2" fill="url(#gold)" opacity="0.15"/>

      <!-- Tier 1 (top, small) -->
      <path d="M78 44 h64 l6 26 h-76 Z" fill="url(#tier3)" stroke="rgba(255,255,255,0.5)" stroke-width="0.5"/>
      <path d="M78 44 q32 10 64 0 v6 q-32 10 -64 0 Z" fill="#FFFFFF" opacity="0.55"/>
      <!-- drip on tier1 -->
      <path d="M78 68 q4 10 8 2 q4 10 8 0 q4 9 8 1 q4 9 8 -1 q4 10 8 0 q4 9 8 1 v-6 h-48 Z" fill="url(#tier3)"/>

      <!-- Tier 2 (middle) -->
      <path d="M58 70 h104 l8 34 h-120 Z" fill="url(#tier2)" stroke="rgba(255,255,255,0.5)" stroke-width="0.5"/>
      <path d="M58 70 q52 14 104 0 v7 q-52 14 -104 0 Z" fill="#FFFFFF" opacity="0.5"/>
      <!-- pearls -->
      <circle cx="70" cy="86" r="2.6" fill="#FFF6F0"/>
      <circle cx="90" cy="86" r="2.6" fill="#FFF6F0"/>
      <circle cx="110" cy="86" r="2.6" fill="#FFF6F0"/>
      <circle cx="130" cy="86" r="2.6" fill="#FFF6F0"/>
      <circle cx="150" cy="86" r="2.6" fill="#FFF6F0"/>
      <!-- drip on tier2 -->
      <path d="M58 104 q6 12 12 2 q6 12 12 0 q6 11 12 1 q6 -11 12 1 q6 12 12 0 q6 12 12 -1 q6 11 12 1 v-6 h-84 Z" fill="url(#tier2)"/>

      <!-- Tier 3 (bottom, large) -->
      <path d="M32 108 h156 l10 44 h-176 Z" fill="url(#tier1)" stroke="rgba(255,255,255,0.5)" stroke-width="0.5"/>
      <path d="M32 108 q78 18 156 0 v8 q-78 18 -156 0 Z" fill="#FFFFFF" opacity="0.45"/>
      <!-- gold ribbon -->
      <rect x="32" y="140" width="166" height="7" fill="#F7D488" opacity="0.85"/>
      <!-- rosettes -->
      <circle cx="55" cy="130" r="6" fill="#FFE3F0"/>
      <circle cx="110" cy="130" r="6" fill="#FFE3F0"/>
      <circle cx="165" cy="130" r="6" fill="#FFE3F0"/>

      <!-- base plate -->
      <ellipse cx="110" cy="154" rx="96" ry="9" fill="#F7D488"/>
      <ellipse cx="110" cy="151" rx="96" ry="9" fill="#FFE9B8"/>

      <!-- sprinkles -->
      <rect x="45" y="118" width="3" height="8" rx="1.5" fill="#C9A6E8" transform="rotate(20 45 118)"/>
      <rect x="180" y="120" width="3" height="8" rx="1.5" fill="#FF9FC8" transform="rotate(-15 180 120)"/>
      <rect x="95" y="115" width="3" height="8" rx="1.5" fill="#F7D488" transform="rotate(10 95 115)"/>
      <rect x="140" y="118" width="3" height="8" rx="1.5" fill="#C9A6E8" transform="rotate(-25 140 118)"/>
    </svg>
  </div>
  <div class="cake-hint" id="cakeHint">tap the cake to make a wish</div>

  <div class="controls">
    <button class="action" id="confettiBtn">🎊 Confetti</button>
    <button class="action" id="fireworkBtn">🎆 Fireworks</button>
    <button class="ghost action" id="musicBtn">🔈 Play Music</button>
  </div>
</main>

<footer>made with love, just for you</footer>

<script>
(function(){
  // ---- URL params ----
  const params = new URLSearchParams(window.location.search);
  const name = params.get('name');
  const msg = params.get('msg');

  const nameLine = document.getElementById('nameLine');
  if(name && name.trim()){
    nameLine.textContent = decodeURIComponent(name).trim() + '!';
  } else {
    nameLine.textContent = 'Beautiful!';
  }
  if(msg && msg.trim()){
    document.getElementById('messageText').textContent = decodeURIComponent(msg);
  }
  document.title = 'Happy Birthday' + (name ? ' ' + decodeURIComponent(name) : '') + '!';

  // ---- Twinkling stars ----
  const starsEl = document.getElementById('stars');
  for(let i=0;i<70;i++){
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random()*100 + '%';
    s.style.top = Math.random()*70 + '%';
    s.style.animationDuration = (1.5 + Math.random()*2.5) + 's';
    s.style.animationDelay = (Math.random()*3) + 's';
    starsEl.appendChild(s);
  }

  // ---- Balloons ----
  const stage = document.getElementById('stage');
  const balloonColors = ['#FF9FC8','#C9A6E8','#F7D488','#E8879E','#FFC9E0'];
  function spawnBalloon(){
    const b = document.createElement('div');
    b.className = 'balloon';
    const color = balloonColors[Math.floor(Math.random()*balloonColors.length)];
    b.style.background = `radial-gradient(circle at 30% 30%, ${color}, ${color}cc 70%)`;
    b.style.left = Math.random()*94 + '%';
    const duration = 10 + Math.random()*6;
    b.style.animationDuration = duration + 's';
    const size = 50 + Math.random()*32;
    b.style.width = size + 'px';
    b.style.height = size*1.25 + 'px';
    stage.appendChild(b);
    setTimeout(()=> b.remove(), duration*1000 + 200);
  }
  for(let i=0;i<7;i++) setTimeout(spawnBalloon, i*800);
  setInterval(spawnBalloon, 2000);

  // ---- Floating gift boxes ----
  const giftColors = [['#FF9FC8','#F7D488'], ['#C9A6E8','#FFF6F0'], ['#E8879E','#FFD6E8']];
  function spawnGift(){
    const g = document.createElement('div');
    g.className = 'gift';
    const [box, ribbon] = giftColors[Math.floor(Math.random()*giftColors.length)];
    g.style.left = Math.random()*90 + '%';
    const duration = 12 + Math.random()*6;
    g.style.animationDuration = duration + 's';
    g.innerHTML = `<svg viewBox="0 0 40 40" width="100%" height="100%">
      <rect x="4" y="16" width="32" height="20" rx="2" fill="${box}"/>
      <rect x="4" y="16" width="32" height="6" fill="${ribbon}"/>
      <rect x="17" y="16" width="6" height="20" fill="${ribbon}"/>
      <path d="M14 16 q-4 -10 6 -12 q2 6 -6 12 Z" fill="${ribbon}"/>
      <path d="M26 16 q4 -10 -6 -12 q-2 6 6 12 Z" fill="${ribbon}"/>
    </svg>`;
    stage.appendChild(g);
    setTimeout(()=> g.remove(), duration*1000 + 200);
  }
  for(let i=0;i<4;i++) setTimeout(spawnGift, i*1500 + 500);
  setInterval(spawnGift, 3200);

  // ---- Confetti ----
  const confettiColors = ['#FF9FC8','#F7D488','#C9A6E8','#FFFFFF','#E8879E'];
  function spawnConfettiBurst(count){
    for(let i=0;i<count;i++){
      setTimeout(()=>{
        const c = document.createElement('div');
        c.className = 'confetti-piece';
        const color = confettiColors[Math.floor(Math.random()*confettiColors.length)];
        const round = Math.random() > 0.5;
        const w = 6 + Math.random()*6;
        const h = round ? w : w*2.4;
        c.style.width = w + 'px'; c.style.height = h + 'px';
        c.style.background = color;
        c.style.borderRadius = round ? '50%' : '2px';
        c.style.left = Math.random()*100 + '%';
        const duration = 3 + Math.random()*2.5;
        c.style.animationDuration = duration + 's';
        stage.appendChild(c);
        setTimeout(()=> c.remove(), duration*1000 + 100);
      }, i*20);
    }
  }
  spawnConfettiBurst(70);
  document.getElementById('confettiBtn').addEventListener('click', ()=> spawnConfettiBurst(90));

  // ---- Fireworks (realistic: rockets + trails + gravity + glow) ----
  const canvas = document.getElementById('fireworksCanvas');
  const ctx = canvas.getContext('2d');
  const DPR = Math.min(window.devicePixelRatio || 1, 2);
  function resize(){
    canvas.width = window.innerWidth * DPR;
    canvas.height = window.innerHeight * DPR;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  resize();
  window.addEventListener('resize', resize);

  let rockets = [];
  let sparks = [];
  const fwColors = ['#FF9FC8','#F7D488','#C9A6E8','#FFFFFF','#E8879E','#FFD6E8','#FFDE7A'];

  function launchRocket(targetX, targetY){
    const startX = targetX + (Math.random()*60-30);
    rockets.push({
      x: startX,
      y: window.innerHeight + 10,
      tx: targetX,
      ty: targetY,
      vx: (targetX - startX) / 55,
      vy: -(window.innerHeight - targetY) / 55 * (0.98 + Math.random()*0.06),
      trail: [],
      color: fwColors[Math.floor(Math.random()*fwColors.length)]
    });
  }

  function burstFirework(x, y, color){
    const count = 70 + Math.floor(Math.random()*30);
    const baseSpeed = 2.2 + Math.random()*1.8;
    const shimmer = Math.random() > 0.5;
    for(let i=0;i<count;i++){
      const angle = (Math.PI*2*i)/count + Math.random()*0.06;
      const speed = baseSpeed * (0.55 + Math.random()*0.6);
      sparks.push({
        x, y,
        vx: Math.cos(angle)*speed,
        vy: Math.sin(angle)*speed,
        life: 1,
        decay: 0.010 + Math.random()*0.012,
        color,
        size: 1.4 + Math.random()*1.6,
        shimmer,
        gravity: 0.045 + Math.random()*0.02
      });
    }
    // secondary crackle sparks (smaller, faster fade, brighter)
    if(Math.random() > 0.45){
      for(let i=0;i<24;i++){
        const angle = Math.random()*Math.PI*2;
        const speed = 1 + Math.random()*3.2;
        sparks.push({
          x, y,
          vx: Math.cos(angle)*speed,
          vy: Math.sin(angle)*speed,
          life: 1,
          decay: 0.03 + Math.random()*0.02,
          color: '#FFFFFF',
          size: 0.9 + Math.random()*0.9,
          shimmer: true,
          gravity: 0.03
        });
      }
    }
  }

  function animateFireworks(){
    // fading trail effect instead of hard clear
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(36,19,50,0.22)';
    ctx.fillRect(0,0,window.innerWidth, window.innerHeight);
    ctx.globalCompositeOperation = 'lighter';

    // rockets rising
    rockets.forEach(r=>{
      r.trail.push({x:r.x, y:r.y});
      if(r.trail.length > 10) r.trail.shift();
      r.x += r.vx;
      r.y += r.vy;
      r.vy += 0.02;

      r.trail.forEach((t,i)=>{
        const a = (i/r.trail.length) * 0.5;
        ctx.globalAlpha = a;
        ctx.fillStyle = r.color;
        ctx.beginPath();
        ctx.arc(t.x, t.y, 1.6, 0, Math.PI*2);
        ctx.fill();
      });

      ctx.globalAlpha = 0.95;
      ctx.shadowColor = r.color;
      ctx.shadowBlur = 8;
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath();
      ctx.arc(r.x, r.y, 2, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;
    });

    rockets.forEach(r=>{
      if(r.y <= r.ty || r.vy >= 0.3){
        burstFirework(r.x, r.y, r.color);
        r.dead = true;
      }
    });
    rockets = rockets.filter(r=>!r.dead);

    // sparks
    sparks.forEach(p=>{
      p.x += p.vx;
      p.y += p.vy;
      p.vy += p.gravity;
      p.vx *= 0.985;
      p.vy *= 0.99;
      p.life -= p.decay;

      const flicker = p.shimmer ? (0.55 + Math.random()*0.45) : 1;
      ctx.globalAlpha = Math.max(p.life,0) * flicker;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 6;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fill();
    });
    ctx.shadowBlur = 0;
    sparks = sparks.filter(p=>p.life > 0);

    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';
    requestAnimationFrame(animateFireworks);
  }
  animateFireworks();

  function randomFireworksVolley(n){
    for(let i=0;i<n;i++){
      setTimeout(()=>{
        const x = window.innerWidth * (0.15 + Math.random()*0.7);
        const y = window.innerHeight * (0.12 + Math.random()*0.3);
        launchRocket(x,y);
      }, i*480);
    }
  }
  setTimeout(()=> randomFireworksVolley(3), 800);
  setInterval(()=> randomFireworksVolley(2), 7000);
  document.getElementById('fireworkBtn').addEventListener('click', ()=> randomFireworksVolley(4));

  // ---- Cake candle blow + wish ----
  let blown = false;
  document.getElementById('cakeWrap').addEventListener('click', function(){
    const flame = document.querySelector('.flame');
    const glow = document.querySelector('.glow');
    const hint = document.getElementById('cakeHint');
    if(!blown){
      flame.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
      flame.style.opacity = '0';
      flame.style.transform = 'scale(0.1)';
      glow.style.opacity = '0';
      hint.textContent = '✨ wish made! happy birthday ✨';
      spawnConfettiBurst(110);
      randomFireworksVolley(3);
      blown = true;
    } else {
      flame.style.opacity = '1';
      flame.style.transform = 'scale(1)';
      glow.style.opacity = '';
      hint.textContent = 'tap the cake to make a wish';
      blown = false;
    }
  });

  // ---- Procedural birthday jingle ----
  let audioCtx = null;
  let playing = false;
  let stopFlag = false;
  const notes = { C4:261.63, D4:293.66, E4:329.63, F4:349.23, G4:392.00, A4:440.00, B4:493.88, C5:523.25, D5:587.33 };
  const melody = [
    ['C4',0.75],['C4',0.25],['D4',1],['C4',1],['F4',1],['E4',2],
    ['C4',0.75],['C4',0.25],['D4',1],['C4',1],['G4',1],['F4',2],
    ['C4',0.75],['C4',0.25],['C5',1],['A4',1],['F4',1],['E4',1],['D4',2],
    ['B4',0.75],['B4',0.25],['A4',1],['F4',1],['G4',1],['F4',2]
  ];
  function playJingle(){
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    stopFlag = false;
    const tempo = 0.32;
    let t = audioCtx.currentTime + 0.1;
    melody.forEach(([note, beats])=>{
      const freq = notes[note];
      const dur = beats*tempo;
      if(!stopFlag){
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.22, t+0.03);
        gain.gain.linearRampToValueAtTime(0, t+dur*0.9);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(t); osc.stop(t+dur);
      }
      t += dur;
    });
    const total = melody.reduce((s,[,b])=>s+b*tempo,0);
    setTimeout(()=>{ if(!stopFlag){ playing=false; updateMusicBtn(); } }, total*1000);
  }
  function updateMusicBtn(){
    document.getElementById('musicBtn').textContent = playing ? '🔇 Pause Music' : '🔈 Play Music';
  }
  document.getElementById('musicBtn').addEventListener('click', function(){
    if(!playing){
      playing = true; updateMusicBtn(); playJingle();
      window._jingleLoop = setInterval(()=>{ if(playing) playJingle(); }, melody.reduce((s,[,b])=>s+b*0.32,0)*1000 + 400);
    } else {
      playing = false; stopFlag = true; clearInterval(window._jingleLoop); updateMusicBtn();
    }
  });

})();
</script>
